# CI for ikigai-fs (urn:fs endpoints). Published crate with a native filesystem
# face AND a wasm32 localStorage backend (web-sys, target-gated), linked into
# both hosts. The wasm lib check guards that browser backend specifically.
name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2

      - name: fmt
        run: cargo fmt --all -- --check

      - name: clippy (native, all targets)
        run: cargo clippy --all-targets -- -D warnings

      - name: test
        run: cargo test

      # The wasm32 localStorage backend (web-sys).
      - name: clippy (wasm lib)
        run: cargo clippy --lib --target wasm32-unknown-unknown -- -D warnings
